<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AIESEC IGV Experience Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #111418; --accent: #0054ff; --text: #ffffff; --dim: #94a3b8; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; padding: 40px; }
        .container { max-width: 1200px; margin: auto; }
        .search-bar { width: 100%; padding: 18px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: white; margin-bottom: 40px; font-size: 16px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
        .card { background: var(--card); border: 1px solid #222; padding: 30px; border-radius: 24px; transition: 0.3s; position: relative; }
        .card:hover { border-color: var(--accent); transform: translateY(-8px); }
        .status { position: absolute; top: 25px; right: 25px; font-size: 10px; font-weight: 800; padding: 5px 12px; border-radius: 50px; }
        .COMPLETED { background: rgba(35, 134, 54, 0.2); color: #3fb950; }
        .REALIZED { background: rgba(31, 111, 235, 0.2); color: #58a6ff; }
        .APPROVED { background: rgba(210, 153, 34, 0.2); color: #d29922; }
        .btn { display: inline-block; width: 45%; text-align: center; padding: 12px; border-radius: 12px; text-decoration: none; font-size: 12px; font-weight: bold; margin-top: 15px; background: #fff; color: #000; }
        .btn-wa { background: #238636; color: #fff; margin-right: 5%; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Experience Hub V2</h1>
        <input type="text" id="searchInput" class="search-bar" placeholder="Buscar por Nombre, País, EP ID o Buddy...">
        <div class="grid" id="container"></div>
    </div>

    <script>
        const CSV_URL = 'TU_URL_CSV_AQUÍ'; // Pestaña "CONTROL AUDITORIAS TNs"
        let allData = [];

        function init() {
            Papa.parse(CSV_URL, {
                download: true, header: true,
                complete: function(results) {
                    allData = results.data.filter(tn => tn['EP/OP NAME']);
                    render(allData);
                }
            });
        }

        function render(data) {
            const container = document.getElementById('container');
            container.innerHTML = '';
            data.forEach(tn => {
                container.innerHTML += `
                    <div class="card">
                        <span class="status ${tn.STATUS}">${tn.STATUS}</span>
                        <h2 style="margin:0">${tn['EP/OP NAME']}</h2>
                        <p style="color:var(--dim)">🌍 ${tn['MC HOME']} | ID: ${tn['EP ID']}</p>
                        <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:12px; font-size:12px; margin:15px 0;">
                            <b>PROYECTO:</b> ${tn['PROJECT NAME']}<br>
                            <b>DATES:</b> ${tn['FECHA RE']} - ${tn['FECHA FI']}
                        </div>
                        <a href="https://wa.me/${tn['Numero de contacto']}" class="btn btn-wa">WhatsApp</a>
                        <a href="#" class="btn">Documentos</a>
                    </div>
                `;
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allData.filter(tn => 
                tn['EP/OP NAME'].toLowerCase().includes(val) || 
                tn['MC HOME'].toLowerCase().includes(val) ||
                tn['EP ID'].includes(val)
            );
            render(filtered);
        });

        window.onload = init;
    </script>
</body>
</html>
