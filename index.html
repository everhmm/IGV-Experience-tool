<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard AIESEC v3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #111418; --accent: #0054ff; --text: #ffffff; --dim: #94a3b8; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; }
        
        /* Navegación de Títulos del Excel */
        .navbar { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; padding-bottom: 20px; border-bottom: 1px solid #222; }
        .nav-btn { background: #1c1f24; color: white; padding: 10px 18px; border-radius: 10px; text-decoration: none; font-size: 12px; font-weight: 700; border: 1px solid #333; transition: 0.3s; }
        .nav-btn:hover { background: var(--accent); border-color: var(--accent); }

        .search-bar { width: 100%; padding: 15px; background: #161b22; border: 1px solid #333; border-radius: 12px; color: white; margin-bottom: 30px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid #222; padding: 20px; border-radius: 18px; }
        .status { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 5px; float: right; }
        .COMPLETED { background: rgba(35, 134, 54, 0.2); color: #3fb950; }
        .REALIZED { background: rgba(31, 111, 235, 0.2); color: #58a6ff; }
        .APPROVED { background: rgba(210, 153, 34, 0.2); color: #d29922; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="#" class="nav-btn" style="background: var(--accent);">📊 Control Auditorías</a>
        <a href="https://www.canva.com/design/DAGmWoBjlhc/..." target="_blank" class="nav-btn">🗺️ Rutas Turísticas</a>
        <a href="#" class="nav-btn">🥟 Comida Típica</a>
        <a href="#" class="nav-btn">💡 Ideas Bienvenida</a>
        <a href="https://www.canva.com/design/DAGhohlT_nY/..." target="_blank" class="nav-btn">🧠 Lead Space</a>
    </div>

    <input type="text" id="searchInput" class="search-bar" placeholder="Buscar voluntario por nombre, país o ID...">

    <div class="grid" id="container"></div>

    <script>
        const CSV_URL = 'TU_LINK_CSV_AQUÍ';
        let allData = [];

        function init() {
            Papa.parse(CSV_URL, {
                download: true, header: true,
                complete: function(results) {
                    allData = results.data.filter(tn => tn['EP/OP NAME']);
                    render(allData);
                }
            });
        }

        function render(data) {
            const container = document.getElementById('container');
            container.innerHTML = '';
            data.forEach(tn => {
                container.innerHTML += `
                    <div class="card">
                        <span class="status ${tn.STATUS}">${tn.STATUS}</span>
                        <h3 style="margin:0">${tn['EP/OP NAME']}</h3>
                        <p style="font-size:12px; color:var(--dim)">${tn['MC HOME']} | ID: ${tn['EP ID']}</p>
                        <p style="font-size:11px">Proyecto: ${tn['PROJECT NAME']}</p>
                        <a href="https://wa.me/${tn['Numero de contacto']}" class="nav-btn" style="display:block; text-align:center; margin-top:10px; background:#238636; border:none">WhatsApp</a>
                    </div>
                `;
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allData.filter(tn => 
                tn['EP/OP NAME'].toLowerCase().includes(val) || 
                tn['MC HOME'].toLowerCase().includes(val) ||
                tn['EP ID'].includes(val)
            );
            render(filtered);
        });

        window.onload = init;
    </script>
</body>
</html>
